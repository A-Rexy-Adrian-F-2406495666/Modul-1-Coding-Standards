name: Scorecard supply-chain security

on:
  # Allow manual run (IMPORTANT for debugging and first setup)
  workflow_dispatch:

  # Run on push to main branch
  push:
    branches: ["main"]

  # Weekly run (Wednesday 09:26 UTC)
  schedule:
    - cron: '26 9 * * 3'

  # Required for branch protection check
  branch_protection_rule:

# Global permissions MUST be read-only (Scorecard requirement)
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest

    # Only run on default branch or pull requests
    if: github.event.repository.default_branch == github.ref_name || github.event_name == 'pull_request'

    # Job-specific permissions (least privilege principle)
    permissions:
      contents: read
      security-events: write
      id-token: write

    steps:

      # Checkout repository safely
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      # Run OpenSSF Scorecard analysis
      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@v2.4.1
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      # Upload SARIF artifact (optional but recommended)
      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5

      # Upload results to GitHub Code Scanning dashboard
      # category prevents conflict with SonarCloud
      - name: Upload to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: scorecard